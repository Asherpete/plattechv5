<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>BantayManila – Sign In / Sign Up</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Gudea:ital,wght@0,400;0,700;1,400&family=Actor&family=Rosario:wght@300;400;600&display=swap"
            rel="stylesheet" />
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
            rel="stylesheet" />
        <link rel="stylesheet" href="style.css" />
    </head>
    <body class="signin-page">

        <!-- NAVBAR -->
        <nav id="navbar">
            <a href="./index.html" class="nav-logo">
                <img
                    src="https://www.figma.com/api/mcp/asset/b3d4e594-af71-45a4-8e39-9efc0e211133"
                    alt="BantayManila Logo" />
            </a>
            <ul class="nav-links">
                <li><a href="./index.html">HOME</a></li>
                <li><a href="./report.html">REPORTS</a></li>
            </ul>
            <div class="nav-buttons"></div>
        </nav>

        <!-- AUTH FORM -->
        <div class="signin-wrapper">
            <div class="container" id="S-container">

                <!-- SIGN UP -->
                <div class="form-container sign-up-container">
                    <form id="signupForm" novalidate>
                        <h1>Create Account</h1>
                        <div class="mb-3 w-100">
                            <input type="text" id="su-name" class="form-control"
                                placeholder="Full Name" required />
                        </div>
                        <div class="mb-3 w-100">
                            <input type="email" id="su-email"
                                class="form-control" placeholder="Email"
                                required />
                        </div>
                        <div class="mb-3 w-100">
                            <input type="password" id="su-pass"
                                class="form-control" placeholder="Password"
                                required />
                        </div>
                        <p class="error text-danger" id="signupError"></p>
                        <button type="submit" class="btn btn-primary w-100">Sign
                            Up</button>
                    </form>
                </div>

                <!-- SIGN IN -->
                <div class="form-container sign-in-container">
                    <form id="signinForm" novalidate>
                        <h1>Sign In</h1>
                        <p>Welcome Back!</p>
                        <div class="mb-3 w-100">
                            <input type="email" id="si-email"
                                class="form-control" placeholder="Email"
                                required />
                        </div>
                        <div class="mb-3 w-100">
                            <input type="password" id="si-pass"
                                class="form-control" placeholder="Password"
                                required />
                        </div>
                        <a href="#"
                            class="forgot mb-3 d-block text-decoration-none">Forgot
                            your password?</a>
                        <p class="error text-danger" id="signinError"></p>
                        <button type="submit" class="btn btn-primary w-100">Sign
                            In</button>
                    </form>
                </div>

                <!-- OVERLAY -->
                <div class="overlay-container">
                    <div class="overlay">
                        <div class="overlay-panel overlay-left">
                            <h1>Welcome Back!</h1>
                            <p>Already have an account?</p>
                            <button class="ghost btn btn-outline-light"
                                id="signIn">SIGN IN</button>
                        </div>
                        <div class="overlay-panel overlay-right">
                            <h1>Join Us</h1>
                            <p>Join the community and track concerns.</p>
                            <button class="ghost btn btn-outline-light"
                                id="signUp">SIGN UP</button>
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        <script type="module" src="./signin-init.js"></script>
    </body>
</html>
