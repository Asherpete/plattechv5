<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>BantayManila – My Account</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Gudea:ital,wght@0,400;0,700;1,400&family=Actor&family=Rosario:wght@300;400;600&display=swap"
            rel="stylesheet" />
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet" />
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
            rel="stylesheet" />
        <link rel="stylesheet" href="style.css" />
    </head>
    <body class="report-page">

        <!-- NAVBAR -->
        <nav id="navbar">
            <a href="./index.html" class="nav-logo">
                <img
                    src="https://www.figma.com/api/mcp/asset/b3d4e594-af71-45a4-8e39-9efc0e211133"
                    alt="BantayManila Logo" />
            </a>
            <ul class="nav-links">
                <li><a href="./index.html">HOME</a></li>
                <li><a href="./index.html#about">ABOUT</a></li>
                <li class="nav-dropdown">
                    <a href="#">REPORTS</a>
                    <div class="dropdown-menu">
                        <a href="./report.html">REPORT AN ISSUE</a>
                        <a href="#">UPDATES</a>
                        <a href="#">IMPROVEMENTS</a>
                    </div>
                </li>
                <li><a href="./index.html#features">FEATURES</a></li>
                <li><a href="./myaccount.html"
                        style="color:white;font-weight:700;">MY ACCOUNT</a></li>
            </ul>
            <div class="nav-buttons">
                <!-- filled by nav-auth.js -->
            </div>
        </nav>

        <!-- NOT LOGGED IN STATE -->
        <div id="notLoggedIn"
            style="display:none; text-align:center; padding:120px 20px;">
            <h2 style="color:#01004c; font-family:'Gudea',sans-serif;">Please
                Sign In</h2>
            <p style="color:#6b7280; margin-top:12px;">You need to be logged in
                to view your account.</p>
            <a href="./signin.html"
                style="display:inline-block;margin-top:20px;background:#930000;color:white;padding:10px 28px;border-radius:8px;text-decoration:none;font-family:'Actor',sans-serif;">Sign
                In</a>
        </div>

        <!-- ACCOUNT CONTENT -->
        <div id="accountContent" style="display:none;">

            <!-- PROFILE HERO -->
            <div class="report-hero" style="min-height:220px;">
                <div class="report-hero-overlay"></div>
                <div class="report-hero-content">
                    <div class="account-avatar" id="accountAvatar">?</div>
                    <h1 id="accountName">My Account</h1>
                    <p id="accountEmail"
                        style="opacity:0.8;font-size:14px;"></p>
                </div>
            </div>

            <main class="report-main" style="max-width:900px;">

                <!-- STATS BAR -->
                <div class="admin-stats" id="accountStats"></div>

                <!-- FILTER TABS -->
                <div class="admin-tabs">
                    <button class="admin-tab active" data-filter="all">All My
                        Reports</button>
                    <button class="admin-tab" data-filter="pending">🕐
                        Pending</button>
                    <button class="admin-tab" data-filter="in-progress">🔧 In
                        Progress</button>
                    <button class="admin-tab" data-filter="finished">✅
                        Finished</button>
                </div>

                <div id="accountFeed" class="post-feed"></div>
            </main>
        </div>

        <script type="module" src="script.js"></script>
        <script type="module" src="./myaccount-init.js"></script>
    </body>
</html>
