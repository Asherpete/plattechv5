<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>BantayManila – Admin Dashboard</title>
        <link href="https://fonts.googleapis.com/css2?family=Gudea:ital,wght@0,400;0,700;1,400&family=Actor&family=Rosario:wght@300;400;600&display=swap" rel="stylesheet" />
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
        <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
        <link rel="stylesheet" href="style.css" />
    </head>
    <body class="report-page">

        <!-- NAVBAR -->
        <nav id="navbar">
            <a href="./index.html" class="nav-logo">
                <img src="https://www.figma.com/api/mcp/asset/b3d4e594-af71-45a4-8e39-9efc0e211133" alt="BantayManila Logo" />
            </a>
            <ul class="nav-links">
                <li><a href="./index.html">HOME</a></li>
                <li><a href="./report.html">REPORTS</a></li>
                <li><a href="./admin.html" style="color:white;font-weight:700;">ADMIN</a></li>
            </ul>
            <div class="nav-buttons">
                <!-- filled by nav-auth.js -->
            </div>
        </nav>

        <!-- ADMIN HEADER -->
        <div class="report-hero" style="min-height:220px;">
            <div class="report-hero-overlay"></div>
            <div class="report-hero-content">
                <h1>🛡️ Admin Dashboard</h1>
                <p>Manage and update the status of all community reports.</p>
            </div>
        </div>

        <!-- ACCESS DENIED MESSAGE (shown if not admin) -->
        <div id="accessDenied" style="display:none; text-align:center; padding:80px 20px;">
            <h2 style="color:#930000; font-family:'Gudea',sans-serif;">⛔ Access Denied</h2>
            <p style="color:#374151; margin-top:12px;">You must be an admin to view this page.</p>
            <a href="./index.html" style="display:inline-block;margin-top:20px;background:#01004c;color:white;padding:10px 28px;border-radius:8px;text-decoration:none;font-family:'Actor',sans-serif;">Go Home</a>
        </div>

        <!-- ADMIN CONTENT -->
        <main class="report-main" id="adminContent" style="display:none; max-width:900px;">
            <!-- STATS BAR -->
            <div class="admin-stats" id="adminStats"></div>

            <!-- FILTER TABS -->
            <div class="admin-tabs">
                <button class="admin-tab active" data-filter="all">All</button>
                <button class="admin-tab" data-filter="pending">🕐 Pending</button>
                <button class="admin-tab" data-filter="in-progress">🔧 In Progress</button>
                <button class="admin-tab" data-filter="finished">✅ Finished</button>
            </div>

            <div id="adminFeed" class="post-feed"></div>
        </main>

        <script src="script.js"></script>
        <script type="module" src="./admin-init.js"></script>
    </body>
</html>
